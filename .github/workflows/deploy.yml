name: Deploy VizAI Inventory

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-workers:
    name: Deploy MCP workers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [mcp-inventory, mcp-orders, mcp-supplier, mcp-alerts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
        working-directory: apps/${{ matrix.worker }}
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:  ${{ secrets.CF_API_TOKEN }}
          workingDirectory: apps/${{ matrix.worker }}
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          MCP_SECRET:          ${{ secrets.MCP_SECRET }}
          ZOHO_CLIENT_ID:      ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET:  ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN:  ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_ORG_ID:         ${{ secrets.ZOHO_ORG_ID }}
          SENDGRID_API_KEY:    ${{ secrets.SENDGRID_API_KEY }}
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-web:
    name: Deploy Next.js to Vercel
    runs-on: ubuntu-latest
    needs: deploy-workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install
        working-directory: apps/web
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          vercel-args:    '--prod'
